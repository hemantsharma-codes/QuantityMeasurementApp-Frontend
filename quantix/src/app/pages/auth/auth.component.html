<div class="auth-page">
  <div class="auth-card">

    <div class="auth-tabs">
      <div class="auth-tab" [class.active]="activeTab==='login'" (click)="switchTab('login')">Sign In</div>
      <div class="auth-tab" [class.active]="activeTab==='register'" (click)="switchTab('register')">Register</div>
    </div>

    <div class="msg-box" *ngIf="message" [class.error]="isError" [class.success]="!isError">
      {{ message }}
    </div>

    <!-- LOGIN -->
    <div *ngIf="activeTab === 'login'">
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">// enter your credentials</div>
      <div class="field">
        <label>Email</label>
        <input type="email" [(ngModel)]="loginEmail" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" [(ngModel)]="loginPassword" placeholder="••••••••" (keyup.enter)="doLogin()" />
      </div>
      <button class="btn btn-primary btn-full" (click)="doLogin()" [disabled]="isLoading">
        {{ isLoading ? 'Please wait...' : 'Sign In' }}
      </button>
      <div class="guest-hint">
        Or <a href="#" (click)="continueAsGuest(); $event.preventDefault()">continue as Guest →</a>
      </div>
    </div>

    <!-- REGISTER -->
    <div *ngIf="activeTab === 'register'">
      <div class="auth-title">Create account</div>
      <div class="auth-sub">// join quantix today</div>
      <div class="field">
        <label>Username</label>
        <input type="text" [(ngModel)]="regUsername" placeholder="cooluser123" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" [(ngModel)]="regEmail" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" [(ngModel)]="regPassword" placeholder="min 6 chars, letter + number" />
      </div>
      <button class="btn btn-primary btn-full" (click)="doRegister()" [disabled]="isLoading">
        {{ isLoading ? 'Please wait...' : 'Create Account' }}
      </button>
    </div>

  </div>
</div>
