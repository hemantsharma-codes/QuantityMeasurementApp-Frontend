<!-- ═══════════════════════════════════════
     AUTH PAGE
═══════════════════════════════════════ -->
<div id="auth-page" class="page">
  <div class="auth-card card-glow">

    <!-- Tabs -->
    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login" onclick="AuthController.switchTab('login')">Sign In</div>
      <div class="auth-tab" data-tab="register" onclick="AuthController.switchTab('register')">Register</div>
    </div>

    <!-- Login Form -->
    <div class="auth-form active" id="login-form">
      <div class="auth-title">Welcome back</div>
      <div class="auth-subtitle">// enter your credentials</div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn btn-primary btn-full mt-16" id="login-btn" onclick="AuthController.login()">
        Sign In
      </button>

      <div class="auth-guest-hint">
        Or continue as
        <a href="#" onclick="AuthController.continueAsGuest(); return false;">Guest →</a>
      </div>
    </div>

    <!-- Register Form -->
    <div class="auth-form" id="register-form">
      <div class="auth-title">Create account</div>
      <div class="auth-subtitle">// join quantix today</div>

      <div class="field">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="cooluser123" autocomplete="username" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="reg-pass" placeholder="min 6 chars, letter + number" autocomplete="new-password" />
      </div>

      <button class="btn btn-primary btn-full mt-16" id="reg-btn" onclick="AuthController.register()">
        Create Account
      </button>
    </div>

  </div>
</div>
