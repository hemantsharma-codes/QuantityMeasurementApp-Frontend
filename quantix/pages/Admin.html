<!-- ═══════════════════════════════════════
     ADMIN SECTION
═══════════════════════════════════════ -->
<div id="admin-page" class="app-section" style="display:none">
  <div class="page-header">
    <h1>Admin Panel</h1>
    <p>// manage users and measurement records</p>
  </div>

  <!-- ── All Users ── -->
  <div class="admin-section">
    <div class="section-title">
      <span>All Users</span>
      <button class="btn btn-ghost btn-sm" onclick="AdminController.loadUsers()">↻ Refresh</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Joined</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="admin-users-body"></tbody>
      </table>
    </div>
  </div>

  <!-- ── Update Role ── -->
  <div class="admin-section">
    <div class="section-title">Update User Role</div>
    <div class="update-role-card">
      <div class="field">
        <label>User Email</label>
        <input type="email" id="role-email" placeholder="user@example.com" />
      </div>
      <div class="field">
        <label>New Role</label>
        <select id="role-select">
          <option value="User">User</option>
          <option value="Admin">Admin</option>
        </select>
      </div>
      <button class="btn btn-primary mt-8" onclick="AdminController.updateRole()">
        Update Role
      </button>
    </div>
  </div>

  <!-- ── All History ── -->
  <div class="admin-section">
    <div class="section-title">
      <span id="admin-hist-title">All Measurement Records</span>
      <div class="flex gap-8">
        <button class="btn btn-danger btn-sm" onclick="AdminController.clearAll()">Clear All</button>
        <button class="btn btn-ghost btn-sm" onclick="AdminController.loadHistory()">↻ Refresh</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-bar mb-16">
      <select id="admin-op-filter" onchange="AdminController.loadHistory()">
        <option value="">All Operations</option>
        <option value="Convert">Convert</option>
        <option value="Compare">Compare</option>
        <option value="Add">Add</option>
        <option value="Subtract">Subtract</option>
        <option value="Divide">Divide</option>
      </select>

      <select id="admin-cat-filter" onchange="AdminController.loadHistory()">
        <option value="">All Categories</option>
        <option value="Length">Length</option>
        <option value="Weight">Weight</option>
        <option value="Volume">Volume</option>
        <option value="Temperature">Temperature</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>User ID</th>
            <th>Operation</th>
            <th>Category</th>
            <th>Input</th>
            <th>Result</th>
            <th>Date</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="admin-hist-body"></tbody>
      </table>
    </div>
  </div>

</div>
